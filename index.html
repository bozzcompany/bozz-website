<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BOZZ Company - Agência de Web & Design. Criamos sites profissionais de alta performance sem taxa de desenvolvimento. Planos mensais com hospedagem, domínio e suporte inclusos.">
  <meta name="keywords" content="bozz company, agência web porto alegre, criação de sites mensalidade, hospedagem de sites poa, design de sites profissional, landing page profissional">
  <meta name="author" content="BOZZ Company">
  
  <title>BOZZ Company - Web & Design de Alto Impacto</title>
  
  <!-- FontAwesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Personalizado -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Elemento de Destino para Injeção Modular da Home -->
  <main id="home-root"></main>

  <!-- Script da Home -->
  <script src="components/home.js"></script>

  <!-- Orquestrador / Carregador dos Componentes -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Injeta apenas o componente Home
      const homePlaceholder = document.getElementById("home-root");
      
      if (homePlaceholder && typeof homeComponent !== 'undefined') {
        homePlaceholder.outerHTML = homeComponent;
      }
    });
  </script>

</body>
</html>
